<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word to JSON</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">WORD TO JSON</p>
        <h1>Word ファイルをブラウザで JSON に変換</h1>
        <p class="hero-copy">
          <code>.docx</code> を読み込んで、見出し・段落・リスト・表を JSON として抽出します。
          変換結果はその場で確認でき、ファイルとしてダウンロードできます。
        </p>
      </header>

      <main class="workspace">
        <section class="panel controls">
          <label class="dropzone" for="file-input" id="dropzone">
            <input id="file-input" type="file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
            <span class="dropzone-title"><code>.docx</code> を選択</span>
            <span class="dropzone-subtitle">クリックまたはドラッグ&ドロップ</span>
          </label>

          <div class="actions">
            <button id="convert-button" type="button">変換する</button>
            <button id="download-button" type="button" disabled>JSON を保存</button>
          </div>

          <dl class="meta" id="meta">
            <div>
              <dt>状態</dt>
              <dd id="status">ファイルを選択してください</dd>
            </div>
            <div>
              <dt>選択中</dt>
              <dd id="selected-file">未選択</dd>
            </div>
            <div>
              <dt>ブロック数</dt>
              <dd id="block-count">0</dd>
            </div>
          </dl>
        </section>

        <section class="panel output">
          <div class="output-header">
            <h2>JSON 出力</h2>
            <p>変換結果は以下に表示されます。</p>
          </div>
          <pre id="json-output">{}</pre>
        </section>
      </main>
    </div>
  </body>
</html>
