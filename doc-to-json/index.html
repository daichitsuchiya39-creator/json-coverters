<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word to JSON</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">WORD TO JSON</p>
        <h1>Convert Word Files to JSON in Your Browser</h1>
        <p class="hero-copy">
          Load a <code>.docx</code> file and extract headings, paragraphs, lists, and tables as JSON.
          Preview the result instantly and download it as a file.
        </p>
      </header>

      <main class="workspace">
        <section class="panel controls">
          <label class="dropzone" for="file-input" id="dropzone">
            <input id="file-input" type="file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
            <span class="dropzone-title">Select a <code>.docx</code> file</span>
            <span class="dropzone-subtitle">Click or drag &amp; drop</span>
          </label>

          <div class="actions">
            <button id="convert-button" type="button">Convert</button>
            <button id="download-button" type="button" disabled>Save JSON</button>
          </div>

          <dl class="meta" id="meta">
            <div>
              <dt>Status</dt>
              <dd id="status">Select a file</dd>
            </div>
            <div>
              <dt>Selected</dt>
              <dd id="selected-file">None</dd>
            </div>
            <div>
              <dt>Block count</dt>
              <dd id="block-count">0</dd>
            </div>
          </dl>
        </section>

        <section class="panel output">
          <div class="output-header">
            <h2>JSON Output</h2>
            <p>Conversion result will be shown below.</p>
          </div>
          <pre id="json-output">{}</pre>
        </section>
      </main>
    </div>
  </body>
</html>
