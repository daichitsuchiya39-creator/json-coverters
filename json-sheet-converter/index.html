<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON-Sheet Converter</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <p class="eyebrow">JSON-SHEET CONVERTER</p>
        <h1>Convert JSON to Excel</h1>
        <p class="lead">
          Load an array or object JSON file, flatten it into a table, and save it as
          <code>.xlsx</code>. Also supports Word-to-JSON output directly.
        </p>
      </header>

      <main class="layout">
        <section class="panel controls">
          <label class="dropzone" id="dropzone" for="file-input">
            <input id="file-input" type="file" accept=".json,application/json" />
            <span class="drop-title">Select a JSON file</span>
            <span class="drop-subtitle">Click or drag &amp; drop</span>
          </label>

          <div class="field">
            <label for="workbook-name">Excel file name</label>
            <input id="workbook-name" type="text" value="converted-workbook" />
          </div>

          <div class="actions">
            <button id="convert-button" type="button">Preview</button>
            <button id="download-button" type="button" disabled>Save Excel</button>
          </div>

          <dl class="meta">
            <div>
              <dt>Status</dt>
              <dd id="status">Select a JSON file</dd>
            </div>
            <div>
              <dt>Selected</dt>
              <dd id="selected-file">None</dd>
            </div>
            <div>
              <dt>Sheet count</dt>
              <dd id="sheet-count">0</dd>
            </div>
          </dl>
        </section>

        <section class="panel preview">
          <div class="preview-header">
            <h2>Conversion Preview</h2>
            <p>Shows the sheets and columns that will be generated.</p>
          </div>
          <div id="preview-root" class="preview-root"></div>
        </section>
      </main>
    </div>
  </body>
</html>
