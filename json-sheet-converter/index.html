<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON-Sheet Converter</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <p class="eyebrow">JSON-SHEET CONVERTER</p>
        <h1>JSON を Excel に変換</h1>
        <p class="lead">
          配列・オブジェクト形式の JSON を読み込み、フラットな表に変換して
          <code>.xlsx</code> として保存します。Word-to-JSON の出力もそのまま扱えます。
        </p>
      </header>

      <main class="layout">
        <section class="panel controls">
          <label class="dropzone" id="dropzone" for="file-input">
            <input id="file-input" type="file" accept=".json,application/json" />
            <span class="drop-title">JSON ファイルを選択</span>
            <span class="drop-subtitle">クリックまたはドラッグ&ドロップ</span>
          </label>

          <div class="field">
            <label for="workbook-name">Excel ファイル名</label>
            <input id="workbook-name" type="text" value="converted-workbook" />
          </div>

          <div class="actions">
            <button id="convert-button" type="button">プレビュー作成</button>
            <button id="download-button" type="button" disabled>Excel を保存</button>
          </div>

          <dl class="meta">
            <div>
              <dt>状態</dt>
              <dd id="status">JSON ファイルを選択してください</dd>
            </div>
            <div>
              <dt>選択中</dt>
              <dd id="selected-file">未選択</dd>
            </div>
            <div>
              <dt>シート数</dt>
              <dd id="sheet-count">0</dd>
            </div>
          </dl>
        </section>

        <section class="panel preview">
          <div class="preview-header">
            <h2>変換プレビュー</h2>
            <p>作成予定のシートと列構成を表示します。</p>
          </div>
          <div id="preview-root" class="preview-root"></div>
        </section>
      </main>
    </div>
  </body>
</html>
